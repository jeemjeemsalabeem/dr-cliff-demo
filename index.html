<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Cliff — AAP Pediatric Knowledge Agent</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=Courier+Prime&display=swap');

  :root {
    --cream: #F3EBDD;
    --navy: #2E3A34;
    --gold: #B59158;
    --rust: #9C5646;
    --cream-dark: #E8DCC8;
    --navy-light: #3d4f47;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--navy);
    font-family: 'Source Serif 4', serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ─── START SCREEN ─────────────────────────────────────────── */
  .start-screen {
    position: fixed;
    inset: 0;
    background: var(--navy);
    background-image: url('assets/poster.png');
    background-size: cover;
    background-position: center top;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    transition: opacity 0.8s ease;
  }

  .start-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(46,58,52,0.5) 0%, rgba(46,58,52,0.72) 100%);
    z-index: 0;
  }

  .start-screen > * {
    position: relative;
    z-index: 1;
  }

  .start-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .start-eyebrow {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.9;
    margin-bottom: 20px;
  }

  .start-name {
    font-family: 'Playfair Display', serif;
    font-size: 72px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 6px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }

  .start-title {
    font-family: 'Source Serif 4', serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    opacity: 0.75;
    margin-bottom: 48px;
  }

  .start-rule {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 48px;
  }

  .start-btn {
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--navy);
    background: var(--gold);
    border: none;
    padding: 14px 40px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }

  .start-btn:hover {
    background: var(--cream);
    transform: translateY(-1px);
  }

  .start-aap {
    position: absolute;
    bottom: 32px;
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.6;
  }

  /* ─── FULL BLEED VIDEO ─────────────────────────────────────── */
  .video-wrap {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
  }

  .video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ─── HEADER ───────────────────────────────────────────────── */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: linear-gradient(to bottom, rgba(46,58,52,0.75) 0%, transparent 100%);
  }

  .wordmark {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .wordmark-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .wordmark-tag {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .aap-logo {
    height: 44px;
    width: auto;
    opacity: 0.65;
    filter: invert(1);
    mix-blend-mode: screen;
    display: block;
  }

  /* ─── LISTENING INDICATOR ──────────────────────────────────── */
  .listen-indicator {
    position: fixed;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(46,58,52,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(181,145,88,0.3);
    border-radius: 20px;
    padding: 8px 16px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 15;
  }

  .listen-indicator.visible { opacity: 1; }

  .pulse-dot {
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .listen-label {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cream);
  }

  /* ─── RESOURCE CARD ────────────────────────────────────────── */
  .resource-card {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(243,235,221,0.96);
    backdrop-filter: blur(12px);
    padding: 20px 40px 32px;
    transform: translateY(100%);
    transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    border-top: 3px solid var(--gold);
    z-index: 20;
  }

  .resource-card.visible { transform: translateY(0); }

  .resource-label {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rust);
    margin-bottom: 8px;
  }

  .resource-title {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.3;
    margin-bottom: 14px;
  }

  .resource-link {
    display: block;
    text-align: center;
    background: var(--navy);
    color: var(--cream);
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 2px;
    transition: background 0.2s ease;
    margin-bottom: 10px;
  }

  .resource-link:hover { background: var(--navy-light); }

  .ask-again-btn {
    display: block;
    width: 100%;
    text-align: center;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    background: none;
    border: 1px solid rgba(181,145,88,0.4);
    padding: 8px;
    border-radius: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s ease;
  }

  .ask-again-btn:hover {
    background: rgba(181,145,88,0.08);
    border-color: var(--gold);
  }

  /* ─── FOOTER ───────────────────────────────────────────────── */
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    background: linear-gradient(to top, rgba(46,58,52,0.65) 0%, transparent 100%);
  }

  .mode-toggle {
    display: flex;
    gap: 4px;
    background: rgba(243,235,221,0.08);
    border: 1px solid rgba(181,145,88,0.2);
    border-radius: 3px;
    padding: 3px;
  }

  .mode-btn {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(243,235,221,0.5);
    background: none;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s ease;
  }

  .mode-btn.active {
    background: var(--gold);
    color: var(--navy);
  }

  .status-text {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(243,235,221,0.3);
    min-width: 120px;
    text-align: right;
  }

  /* ─── MANUAL TAP ZONES ─────────────────────────────────────── */
  .manual-triggers {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
  }

  .tap-zone {
    position: absolute;
    width: 80px;
    height: 80px;
    pointer-events: all;
    opacity: 0;
    cursor: pointer;
  }

  .tap-zone-1 { top: 0; left: 0; }
  .tap-zone-2 { top: 0; right: 0; }
  .tap-zone-3 { bottom: 0; left: 0; }
  .tap-zone-4 { bottom: 0; right: 0; }
  .tap-zone-5 { top: 50%; left: 0; transform: translateY(-50%); }

  .speech-warning {
    display: none;
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--rust);
    z-index: 15;
  }
</style>
</head>
<body>

<!-- Start screen -->
<div class="start-screen" id="startScreen" onclick="handleStart()">
  <div class="start-eyebrow">American Academy of Pediatrics</div>
  <div class="start-name">Dr. Cliff</div>
  <div class="start-title">Voice of 67,000 Pediatricians</div>
  <div class="start-rule"></div>
  <button class="start-btn">Meet Dr. Cliff</button>
  <div class="start-aap">A parent's cure for medical misinformation</div>
</div>

<!-- Full bleed video -->
<div class="video-wrap">
  <video id="mainVideo" playsinline></video>
</div>

<!-- Header -->
<div class="header">
  <div class="wordmark">
    <span class="wordmark-name">Dr. Cliff</span>
    <span class="wordmark-tag">The Voice of 67,000 Pediatricians</span>
  </div>
  <img class="aap-logo" src="assets/aap-logo.png" alt="American Academy of Pediatrics" />
</div>

<!-- Listening indicator -->
<div class="listen-indicator" id="listenIndicator">
  <div class="pulse-dot"></div>
  <span class="listen-label">Listening</span>
</div>

<!-- Resource card -->
<div class="resource-card" id="resourceCard">
  <div class="resource-label" id="resourceLabel">From the AAP</div>
  <div class="resource-title" id="resourceTitle"></div>
  <a class="resource-link" id="resourceLink" href="#" target="_blank">
    <span id="resourceLinkText">Read the full guide</span>
  </a>
  <button class="ask-again-btn" id="askAgainBtn">Ask another question</button>
</div>

<div class="speech-warning" id="speechWarning">Voice recognition unavailable — use tap zones</div>

<!-- Footer -->
<div class="footer">
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnDemo" onclick="setMode('demo')">Demo</button>
    <button class="mode-btn" id="btnFull" onclick="setMode('full')">Full</button>
  </div>
  <div class="status-text" id="statusText">Ready</div>
</div>

<!-- Hidden manual backup tap zones -->
<div class="manual-triggers">
  <div class="tap-zone tap-zone-1" onclick="manualTrigger(1)"></div>
  <div class="tap-zone tap-zone-2" onclick="manualTrigger(2)"></div>
  <div class="tap-zone tap-zone-3" onclick="manualTrigger(3)"></div>
  <div class="tap-zone tap-zone-4" onclick="manualTrigger(4)"></div>
  <div class="tap-zone tap-zone-5" onclick="manualTrigger(5)"></div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
const ASSETS = 'assets/';

const VIDEOS = {
  greeting: ASSETS + 'greeting.mp4',
  loop:     ASSETS + 'loop.mp4',
  e1:       ASSETS + 'exchange1.mp4',
  e2:       ASSETS + 'exchange2.mp4',
  e3:       ASSETS + 'exchange3.mp4',
  e4:       ASSETS + 'exchange4.mp4',
  e5:       ASSETS + 'exchange5.mp4',
};

const EXCHANGES = {
  demo: [
    {
      id: 1,
      video: VIDEOS.e1,
      keywords: ['spoil','hold','holding','baby','cuddle','pick up','arms'],
      resource: {
        label: 'From the AAP',
        title: 'Why holding your baby builds trust, not bad habits',
        url: 'https://publications.aap.org/pediatricsinreview/article-abstract/36/1/41/32220/Parent-Infant-Attachment?redirectedFrom=fulltext',
        linkText: 'Read the full guide →',
      }
    },
    {
      id: 2,
      video: VIDEOS.e2,
      keywords: ['breastfeed','breastfeeding','nursing','nurse','milk','hungry','latch','feed'],
      resource: {
        label: 'From the AAP',
        title: 'Breastfeeding: AAP policy and what the science says',
        url: 'https://www.healthychildren.org/English/ages-stages/baby/breastfeeding/Pages/Where-We-Stand-Breastfeeding.aspx',
        linkText: 'Read the full guide →',
      }
    },
    {
      id: 3,
      video: VIDEOS.e3,
      keywords: ['measles','vaccine','mmr','vaccinate','preschool','mandatory','shot','immunize'],
      resource: {
        label: 'From the AAP',
        title: 'How to protect your child during a measles outbreak',
        url: 'https://www.healthychildren.org/English/safety-prevention/immunizations/Pages/how-to-protect-your-children-during-a-measles-outbreak.aspx',
        linkText: 'Read the full guide →',
      }
    },
    {
      id: 4,
      video: VIDEOS.e4,
      keywords: ['gives kids measles','heard','rumor','true','cause','they say','people say'],
      resource: {
        label: 'From the AAP',
        title: 'Measles: what parents need to know right now',
        url: 'https://www.healthychildren.org/English/health-issues/vaccine-preventable-diseases/Pages/Measles.aspx',
        linkText: 'Read the full guide →',
      }
    },
    {
      id: 5,
      video: VIDEOS.e5,
      keywords: ['fever','ear','103','sick','temperature','hot','ill','earache','ear ache'],
      resource: {
        label: 'From the AAP',
        title: 'Fever: when to call the pediatrician',
        url: 'https://www.healthychildren.org/English/health-issues/conditions/fever/Pages/When-to-Call-the-Pediatrician.aspx',
        linkText: 'Read the full guide →',
      }
    },
  ]
};

EXCHANGES.full = EXCHANGES.demo;

// ─── STATE ────────────────────────────────────────────────────────
let mode = 'demo';
let state = 'idle';
let recognition = null;
let speechSupported = false;
let currentExchange = null;
let greetingDone = false;

const video = document.getElementById('mainVideo');
const listenIndicator = document.getElementById('listenIndicator');
const resourceCard = document.getElementById('resourceCard');
const statusText = document.getElementById('statusText');

// ─── START ────────────────────────────────────────────────────────
function handleStart() {
  const startScreen = document.getElementById('startScreen');
  startScreen.classList.add('fade-out');
  setTimeout(() => {
    startScreen.style.display = 'none';
    playGreeting();
  }, 800);
}

// ─── GREETING ─────────────────────────────────────────────────────
function playGreeting() {
  state = 'greeting';
  setStatus('Playing…');
  hideResourceCard();
  hideListenIndicator();

  video.src = VIDEOS.greeting;
  video.loop = false;
  video.play().catch(e => console.warn(e));

  video.onended = () => {
    video.onended = null;
    greetingDone = true;
    // Freeze on last frame, open mic
    state = 'listening';
    setStatus('Listening…');
    showListenIndicator();
    startMic();
  };
}

// ─── EXCHANGE ─────────────────────────────────────────────────────
function triggerExchange(exchange) {
  if (state === 'greeting') return;
  if (state === 'playing' && currentExchange && currentExchange.id === exchange.id) return;

  currentExchange = exchange;
  state = 'playing';
  setStatus('Exchange ' + exchange.id);

  hideResourceCard();
  hideListenIndicator();

  video.onended = null;
  video.src = exchange.video;
  video.loop = false;
  video.play().catch(e => console.warn(e));

  video.onended = () => {
    video.onended = null;
    showResult(exchange);
  };
}

// ─── RESULT — freeze frame ─────────────────────────────────────────
function showResult(exchange) {
  state = 'result';
  video.pause();
  setStatus('Ask another question');
  showResourceCard(exchange.resource);
  showListenIndicator();
}

// ─── RESOURCE CARD ────────────────────────────────────────────────
function showResourceCard(resource) {
  document.getElementById('resourceLabel').textContent = resource.label;
  document.getElementById('resourceTitle').textContent = resource.title;
  document.getElementById('resourceLinkText').textContent = resource.linkText;
  const link = document.getElementById('resourceLink');
  link.href = resource.url;
  link.target = '_blank';
  setTimeout(() => resourceCard.classList.add('visible'), 80);
}

function hideResourceCard() {
  resourceCard.classList.remove('visible');
}

document.getElementById('askAgainBtn').addEventListener('click', () => {
  hideResourceCard();
  state = 'listening';
  setStatus('Listening…');
});

// ─── LISTEN INDICATOR ─────────────────────────────────────────────
function showListenIndicator() { listenIndicator.classList.add('visible'); }
function hideListenIndicator() { listenIndicator.classList.remove('visible'); }

// ─── SPEECH ───────────────────────────────────────────────────────
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById('speechWarning').style.display = 'block';
    speechSupported = false;
    return;
  }
  speechSupported = true;
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (e) => {
    // Only match when we're in a state that should respond
    if (state === 'idle' || state === 'greeting') return;
    let transcript = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        transcript += e.results[i][0].transcript;
      }
    }
    if (!transcript.trim()) return;
    transcript = transcript.toLowerCase();
    console.log('Heard:', transcript, '| State:', state);
    matchKeywords(transcript);
  };

  let isRestarting = false;

  recognition.onerror = (e) => {
    if (e.error === 'not-allowed') {
      document.getElementById('speechWarning').style.display = 'block';
      return;
    }
    console.warn('Speech error:', e.error);
  };

  recognition.onend = () => {
    if (isRestarting) return;
    isRestarting = true;
    setTimeout(() => {
      isRestarting = false;
      try { recognition.start(); } catch(e) {}
    }, 250);
  };

  // Start immediately on init
  try { recognition.start(); } catch(e) {}
}

function startMic() { /* mic always running */ }
function stopMic() { /* mic always running */ }

function matchKeywords(transcript) {
  const exchanges = EXCHANGES[mode];
  for (const ex of exchanges) {
    for (const kw of ex.keywords) {
      if (transcript.includes(kw)) {
        triggerExchange(ex);
        return;
      }
    }
  }
}

// ─── MODE ─────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnDemo').classList.toggle('active', m === 'demo');
  document.getElementById('btnFull').classList.toggle('active', m === 'full');
}

// ─── MANUAL BACKUP TAPS ───────────────────────────────────────────
function manualTrigger(n) {
  const exchange = EXCHANGES[mode].find(e => e.id === n);
  if (exchange) triggerExchange(exchange);
}

// ─── STATUS ───────────────────────────────────────────────────────
function setStatus(text) { statusText.textContent = text; }

// ─── BOOT ─────────────────────────────────────────────────────────
initSpeech();
</script>
</body>
</html>
